name: Validate
on: 
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: hacs
    
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
